<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Rohit Education</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f8fc;
}
header{
background:#0d6efd;
color:white;
padding:20px;
text-align:center;
}
.container{
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}
input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}
button{
background:#0d6efd;
color:white;
border:none;
padding:12px 25px;
border-radius:5px;
cursor:pointer;
}
footer{
margin-top:30px;
background:#212529;
color:white;
text-align:center;
padding:15px;
}
</style>
</head>
<body>

<header>
<h1>Contact Us</h1>
</header>

<div class="container">
<h2>Get in Touch</h2>

<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea rows="6" placeholder="Write your message..."></textarea>

<button>Send Message</button>

</div>

<footer>
© 2026 Rohit Education
</footer>

</body>
</html>
